<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>milvasic tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    header {
      max-width: 720px;
      margin: 0 auto 2.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #8b949e;
      font-size: 1rem;
    }

    .tool-list {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 1rem;
      list-style: none;
    }

    .tool-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
    }

    .tool-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .tool-info { flex: 1; min-width: 0; }

    .tool-name {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
      text-decoration: none;
    }

    .tool-name:hover { text-decoration: underline; }

    .tool-desc {
      margin-top: 0.25rem;
      font-size: 0.9rem;
      color: #8b949e;
    }

    .tool-link {
      flex-shrink: 0;
      font-size: 0.8rem;
      color: #8b949e;
      text-decoration: none;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      white-space: nowrap;
    }

    .tool-link:hover {
      background: #21262d;
      border-color: #8b949e;
      color: #e6edf3;
    }

    .install-wrapper {
      position: relative;
    }

    .install-block {
      display: block;
      background: #010409;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.6rem 2.5rem 0.6rem 1rem;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.82rem;
      color: #a5d6ff;
      overflow-x: auto;
      white-space: pre;
    }

    .copy-btn {
      position: absolute;
      top: 50%;
      right: 0.6rem;
      transform: translateY(-50%);
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      width: 26px;
      height: 26px;
    }

    .copy-btn:hover {
      background: #30363d;
      border-color: #8b949e;
      color: #e6edf3;
    }

    .copy-btn.copied {
      color: #3fb950;
      border-color: #3fb950;
    }

    footer {
      max-width: 720px;
      margin: 2.5rem auto 0;
      font-size: 0.8rem;
      color: #484f58;
      text-align: center;
    }

    footer a { color: #8b949e; }
    footer a:hover { color: #e6edf3; }
  </style>
</head>
<body>
  <header>
    <h1>milvasic tools</h1>
    <p>A collection of single-file CLI tools for developer workflows.</p>
  </header>

  <ul class="tool-list" id="tool-list" role="list"></ul>

  <noscript>
    <p style="max-width:720px;margin:0 auto;color:#8b949e;text-align:center">
      JavaScript is required to render this page. See the
      <a href="https://github.com/milvasic/mtoolbox#readme" style="color:#8b949e">README</a>
      for the full tool list.
    </p>
  </noscript>

  <footer>
    <p>
      <a href="https://github.com/milvasic/mtoolbox">milvasic/mtoolbox</a>
    </p>
  </footer>
  <script>
    var ICON_COPY = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>';
    var ICON_CHECK = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>';

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function copyInstall(btn) {
      var code = btn.previousElementSibling.textContent;
      navigator.clipboard.writeText(code).then(function () {
        btn.innerHTML = ICON_CHECK;
        btn.classList.add('copied');
        setTimeout(function () {
          btn.innerHTML = ICON_COPY;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    fetch('tools.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var list = document.getElementById('tool-list');
        data.tools.forEach(function (tool) {
          var installCmd = 'bash -c "$(curl -fsSL ' + tool.install_url + ')"';
          var li = document.createElement('li');
          li.className = 'tool-card';
          li.innerHTML =
            '<div class="tool-header">' +
              '<div class="tool-info">' +
                '<a class="tool-name" href="' + esc(tool.homepage) + '">' + esc(tool.name) + '</a>' +
                '<p class="tool-desc">' + esc(tool.description) + '</p>' +
              '</div>' +
              '<a class="tool-link" href="' + esc(tool.homepage) + '">GitHub &rarr;</a>' +
            '</div>' +
            '<div class="install-wrapper">' +
              '<code class="install-block">' + esc(installCmd) + '</code>' +
              '<button class="copy-btn" onclick="copyInstall(this)" title="Copy to clipboard" aria-label="Copy to clipboard">' + ICON_COPY + '</button>' +
            '</div>';
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
